<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMGverse Search — All Stock Image Providers in One Place</title>
    <meta name="description" content="Search iNaturalist, Unsplash, Pexels, and Pixabay at once. Paginated results with direct provider image links.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=1.0.26">
</head>
<body>

    <header id="site-header">
        <div class="logo">
            <div class="logo-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            IMGverse Search
        </div>

        <form id="search-form" role="search" aria-label="Search stock images">
            <div class="search-wrapper">
                <svg class="search-icon" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input
                    type="search"
                    id="search-input"
                    name="q"
                    placeholder="Search millions of stock images..."
                    autocomplete="off"
                    aria-label="Search query"
                    required>
            </div>
        </form>
    </header>

    <div id="filters-bar" aria-label="Filter by provider">
        <button class="filter-pill active" data-provider="">All Providers</button>
        <button class="filter-pill" data-provider="unsplash">Unsplash</button>
        <button class="filter-pill" data-provider="pexels">Pexels</button>
        <button class="filter-pill" data-provider="inaturalist">iNaturalist</button>
        <button class="filter-pill" data-provider="pixabay">Pixabay</button>
    </div>

    <div id="orientation-bar" aria-label="Filter by orientation">
        <span class="filter-label">Orientation:</span>
        <button class="orient-pill active" data-orientation="">Any</button>
        <button class="orient-pill" data-orientation="landscape">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
            Landscape
        </button>
        <button class="orient-pill" data-orientation="portrait">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><rect x="6" y="2" width="12" height="20" rx="2"/></svg>
            Portrait
        </button>
        <button class="orient-pill" data-orientation="square">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            Square
        </button>
    </div>

    <aside id="batch-panel" class="batch-panel" aria-label="Batch download">
        <button type="button" id="batch-toggle" class="batch-panel__toggle" aria-expanded="false" aria-controls="batch-body">
            <span>Batch download</span>
            <svg class="batch-panel__chevron" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="batch-body" class="batch-panel__body hidden">
            <p class="batch-panel__hint">Paste filenames (one per line), turn on batch mode, click images in order, then download all as separate JPEG files.</p>
            <textarea id="batch-filenames" class="batch-panel__textarea" rows="6" placeholder="Ferret laws in West Virginia&#10;Ferret laws in Vermont&#10;Ferret laws in Utah"></textarea>
            <div class="batch-panel__meta">
                <span id="batch-filename-count">0 filenames</span>
                <span id="batch-selection-count">0 images selected</span>
            </div>
            <label class="batch-panel__mode">
                <input type="checkbox" id="batch-mode">
                Batch mode — click images to assign in order
            </label>
            <div class="batch-panel__actions">
                <button type="button" id="batch-clear" class="batch-btn batch-btn--secondary" disabled>Clear selection</button>
                <button type="button" id="batch-download" class="batch-btn batch-btn--primary" disabled>Download queue</button>
            </div>
            <p id="batch-status" class="batch-status" aria-live="polite"></p>
        </div>
    </aside>

    <main id="main-content">
        <div id="empty-state" class="empty-state" aria-live="polite">
            <div class="empty-icon" aria-hidden="true">
                <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <h2>Search for anything</h2>
            <p>Find images across iNaturalist, Unsplash, Pexels, and Pixabay — 20 per provider, per page.</p>
        </div>

        <div id="grid" class="grid" aria-label="Search results" aria-live="polite"></div>

        <div id="loader" class="loader hidden" aria-label="Loading results">
            <span></span><span></span><span></span>
        </div>

        <nav id="pagination" class="pagination hidden" aria-label="Results pages">
            <button type="button" id="page-prev" class="page-btn" disabled>Previous</button>
            <div class="page-info">
                <span id="page-label">Page 1</span>
                <span id="page-count" class="page-count"></span>
            </div>
            <button type="button" id="page-next" class="page-btn">Next</button>
        </nav>
    </main>

    <script src="/app.js?v=1.0.26"></script>
</body>
</html>
