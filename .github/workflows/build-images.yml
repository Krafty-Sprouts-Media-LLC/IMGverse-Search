name: Build and Push Docker Images

# =============================================================================
# build-images.yml
# IMGverse Search — Build and push app + nginx images to GHCR on every
# push to main that touches source files. Mirrors KSM WPDokploystack pattern.
#
# @package IMGverse-Search
# @since   1.0.0
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image prefix
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=ghcr.io/${OWNER_LC}/imgverse-search" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read stack version
        id: version
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' meta.json | head -1 | cut -d'"' -f4)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Stack version: ${VERSION}"

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-app:latest
            ${{ env.IMAGE_PREFIX }}-app:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-nginx:latest
            ${{ env.IMAGE_PREFIX }}-nginx:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
